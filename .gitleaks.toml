title = "公司密钥泄露检测规则"

# ===== 自定义规则示例 =====

# 规则1：检测公司内部 AK/SK
[[rules]]
id = "company-aksk"
description = "检测公司内部 Access Key / Secret Key"
regex = '''(?i)(access_key|secret_key|ak|sk)[-_]?[=:]\s*['"]?([A-Za-z0-9+/=_-]{16,})['"]?'''
secretGroup = 2
entropy = 3.5
keywords = ["access_key", "secret_key", "ak", "sk"]

# 规则2：检测内部 JWT Token 格式
[[rules]]
id = "company-jwt"
description = "检测内部 JWT Token"
regex = '''eyJ[A-Za-z0-9-_]+\.eyJ[A-Za-z0-9-_]+\.[A-Za-z0-9-_.+\/=]+'''
entropy = 0
tags = ["jwt", "token"]

# 规则3：检测数据库连接串
[[rules]]
id = "company-db-conn"
description = "检测数据库连接字符串"
regex = '''(mysql|postgres|mongodb|redis):\/\/[^\s'"]+'''
entropy = 3.0
keywords = ["mysql", "postgres", "mongodb", "redis"]

# ===== 全局白名单 =====
[allowlist]
description = "全局忽略规则"
paths = [
  '''(.*?)(png|jpg|gif|svg|ico)$''',  # 忽略图片文件
  '''go\.sum$''',                       # 忽略 Go 依赖校验文件
  '''package-lock\.json$''',            # 忽略 npm lock 文件
  '''test\/.*''',                        # 忽略测试目录
  '''fixtures\/.*''',                    # 忽略测试样例
  '''\.min\.js$''',                      # 忠略压缩文件
]
commits = [
  '''^(feat|chore|docs|style|refactor|test|ci|build)\(.*\):''',  # 忽略特定类型提交
]